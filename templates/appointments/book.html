{% extends "base.html" %}
{% block title %}Book Appointment — HealthPortal{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <h1 class="text-2xl font-bold text-gray-800 mb-6">Book an Appointment</h1>

  <!-- Step 1: Doctor + Date picker -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Step 1 — Choose Doctor & Date</h2>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Doctor</label>
        <select id="doctor-select" name="doctor_id"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          hx-get="{% url 'appointments:slots' %}"
          hx-trigger="change"
          hx-target="#slots-container"
          hx-include="#date-input"
          hx-indicator="#slot-spinner">
          <option value="">— Select a doctor —</option>
          {% for doctor in doctors %}
          <option value="{{ doctor.pk }}">
            Dr. {{ doctor.user.get_full_name }} — {{ doctor.get_specialization_display }}
            (KES {{ doctor.consultation_fee }})
          </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
        <input type="date" id="date-input" name="date" value="{{ tomorrow }}" min="{{ tomorrow }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          hx-get="{% url 'appointments:slots' %}"
          hx-trigger="change"
          hx-target="#slots-container"
          hx-include="#doctor-select"
          hx-indicator="#slot-spinner" />
      </div>

    </div>
  </div>

  <!-- Step 2: Available slots (loaded via HTMX) -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Step 2 — Pick a Time Slot</h2>
      <!-- HTMX loading spinner -->
      <span id="slot-spinner" class="htmx-indicator text-blue-600 text-sm">Loading slots…</span>
    </div>

    <div id="slots-container">
      <p class="text-gray-400 text-sm">Select a doctor and date above to see available slots.</p>
    </div>
  </div>

</div>

<script>
  /*
   * Force YYYY-MM-DD format before HTMX sends the date value.
   * HTML date inputs internally always store as YYYY-MM-DD but some
   * browsers (Firefox on Linux, Safari on some locales, older Android
   * WebView) may submit display format instead.
   * This intercepts every HTMX request and normalises the date param.
   */
  document.body.addEventListener('htmx:configRequest', function(evt) {
    const params = evt.detail.parameters;
    if (params.date) {
      params.date = normalizeDate(params.date);
    }
  });

  function normalizeDate(raw) {
    raw = raw.trim();
    // Already correct format
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;

    // Use the date input's valueAsDate which is always a proper Date object
    const input = document.getElementById('date-input');
    if (input && input.valueAsDate) {
      const d = input.valueAsDate;
      const yyyy = d.getUTCFullYear();
      const mm   = String(d.getUTCMonth() + 1).padStart(2, '0');
      const dd   = String(d.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    // Fallback: parse common formats manually
    // DD/MM/YYYY
    let m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;

    // MM-DD-YYYY
    m = raw.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
    if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;

    // Return as-is if nothing matches — server will catch it
    return raw;
  }
</script>
{% endblock %}
