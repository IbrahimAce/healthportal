{% extends "base.html" %}
{% block title %}Cancel Appointment — HealthPortal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
    <div class="text-4xl mb-4">⚠️</div>
    <h1 class="text-xl font-bold text-gray-800 mb-2">Cancel Appointment?</h1>
    <p class="text-gray-500 text-sm mb-6">
      {{ appointment.date }} at {{ appointment.start_time|time:"H:i" }}
      with Dr. {{ appointment.doctor.get_full_name }}
    </p>
    <form method="POST">
      {% csrf_token %}
      <button type="submit"
        class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded-lg text-sm mb-3 transition">
        Yes, Cancel Appointment
      </button>
    </form>
    <a href="{% url 'appointments:detail' appointment.pk %}"
       class="block text-sm text-gray-500 hover:text-gray-700">
      Keep appointment
    </a>
  </div>
</div>
{% endblock %}
