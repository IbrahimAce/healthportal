{% extends "base.html" %}
{% block title %}Login — HealthPortal{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="bg-white shadow-md rounded-xl p-8 w-full max-w-md">

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Welcome back</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your HealthPortal account</p>
    </div>

    <form method="POST" action="{% url 'accounts:login' %}" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" name="email" required autofocus
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="you@example.com" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••" />
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account?
      <a href="{% url 'accounts:register' %}" class="text-blue-600 font-medium hover:underline">Register as Patient</a>
    </p>

  </div>
</div>
{% endblock %}
