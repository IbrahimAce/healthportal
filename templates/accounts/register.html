{% extends "base.html" %}
{% block title %}Register — HealthPortal{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="bg-white shadow-md rounded-xl p-8 w-full max-w-md">

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Create Patient Account</h1>
      <p class="text-gray-500 text-sm mt-1">Doctors & staff are added by the administrator</p>
    </div>

    <form method="POST" action="{% url 'accounts:register' %}" class="space-y-4">
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">First name</label>
          <input type="text" name="first_name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Last name</label>
          <input type="text" name="last_name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" name="email" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone number</label>
        <input type="text" name="phone" placeholder="+254 7XX XXX XXX"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
        <input type="password" name="password2" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account?
      <a href="{% url 'accounts:login' %}" class="text-blue-600 font-medium hover:underline">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
